apiVersion: v1
kind: Pod
metadata:
  name: test-pd
spec:
  containers:
  - image: nginx
    name: nginx
    volumeMounts:
    - mountPath: /var/log/nginx
      name: nginx-logs

  - image: almalinux:9
    name: almalinux
    command: ["sleep", "3600"]
    volumeMounts:
          - mountPath: /var/log/nginx
            name: nginx-logs
            readOnly: true
  volumes:
  - name: nginx-logs
    emptyDir:
      sizeLimit: 500Mi